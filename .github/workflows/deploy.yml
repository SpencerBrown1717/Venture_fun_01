name: Scout — deploy dashboard

# Publishes the static dashboard to GitHub Pages via the modern Actions flow.
# - On push: deploy the already-committed dashboard instantly (reliable; no
#   dependency on live data sources).
# - On schedule / manual: also refresh the dataset from SEC EDGAR first, commit
#   it, then deploy. A flaky source can never take the site down — the committed
#   dashboard/data.json is always the fallback.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 1 * *" # monthly (1st ~06:17 PT) — fills up as new C-corps form
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh dataset — real DE incorporations + Pre-Form-D Radar
        # Only on schedule/manual runs, and never fatal: if SEC EDGAR is slow or
        # changes shape, we keep the committed dataset and still deploy.
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          python -m scout gen-sample --since $(date +%Y)-01-01 --limit 400 --general-fill
          python -m scout run --source sample --limit 500 --research --no-fetch-site --include-pre-form-d --pre-form-d-limit 200 --export

      - name: Commit refreshed dataset (keeps repo data current)
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add scout/data/sample_companies.json scout/data/fixtures/yc_ai_companies.json dashboard/data.json
          git commit -m "chore: refresh Delaware dataset [skip ci]" || echo "no changes"
          git push || echo "push skipped"

      - name: Assemble Pages site
        # Site root = the redirect index.html; the full app lives at /dashboard/.
        # .nojekyll serves every file as-is (no Jekyll processing).
        run: |
          mkdir -p _site/dashboard
          cp -r dashboard/. _site/dashboard/
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
