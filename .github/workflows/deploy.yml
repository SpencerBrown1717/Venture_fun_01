name: Scout — discover & deploy dashboard

# Always-on Venture Intelligence (stretch goal 8):
# regenerate the data with the autonomous pipeline and publish the dashboard to
# GitHub Pages. Runs on push, weekly (so the monthly window stays fresh), and on
# demand. The data source is SEC EDGAR's DE state-of-incorporation filter, which
# is a reliable free API — so scheduled runs don't depend on flaky scraping.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 1 * *" # monthly (1st ~06:17 PT) — fills up as new C-corps form
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Grow dataset — real DE incorporations (all of this year) + Form D enrichment
        # Harvests operating companies incorporated in DE from SEC EDGAR month by
        # month for the whole year, drops pooled funds, enriches each with real
        # officers / stage / capital, and MERGES into the existing dataset so the
        # corpus grows organically as new C-corps form.
        run: python -m scout gen-sample --since $(date +%Y)-01-01 --limit 400 --general-fill

      - name: Run Venture Analyst Swarm on the enriched sample
        run: python -m scout run --source sample --limit 500 --research --no-fetch-site --export

      - name: Commit refreshed dataset (keeps repo data current)
        continue-on-error: true
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add scout/data/sample_companies.json dashboard/data.json
          git commit -m "chore: refresh Delaware dataset [skip ci]" || echo "no changes"
          git push || echo "push skipped"

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
