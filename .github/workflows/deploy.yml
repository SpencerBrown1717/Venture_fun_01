name: Deploy SCOUT dashboard to GitHub Pages

# Publishes the static dashboard/ folder to GitHub Pages.
#
# Design: the DEPLOY never depends on the data pipeline. The committed
# dashboard/data.json is always shippable, so a flaky SEC EDGAR fetch can never
# block the site from going live. The data refresh runs best-effort (monthly /
# on demand) and simply commits a newer data.json when it succeeds.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 13 1 * *" # monthly (1st ~06:17 PT) — fills up as new C-corps form
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Best-effort data refresh (never blocks the deploy) -------------
      - name: Grow dataset — real DE incorporations + Form D enrichment
        continue-on-error: true
        run: python -m scout gen-sample --since $(date +%Y)-01-01 --limit 400 --general-fill

      - name: Run Venture Analyst Swarm (Form D + Pre-Form-D Radar)
        continue-on-error: true
        run: python -m scout run --source sample --limit 500 --research --no-fetch-site --include-pre-form-d --pre-form-d-limit 200 --export

      - name: Commit refreshed dataset (if it changed)
        continue-on-error: true
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add scout/data/sample_companies.json scout/data/fixtures/yc_ai_companies.json dashboard/data.json
          git commit -m "chore: refresh Delaware dataset [skip ci]" || echo "no changes"
          git push || echo "push skipped"

      # --- Always publish the committed dashboard -------------------------
      - name: Ensure Pages serves static assets verbatim
        run: touch dashboard/.nojekyll

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
